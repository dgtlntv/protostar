name: tests

on:
    push:
        branches: ["main"]
    pull_request:

permissions:
    contents: read

jobs:
    tests:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Set up Node
              uses: actions/setup-node@v4
              with:
                  node-version: 24
                  cache: "pnpm"

            - name: Set up pnpm
              uses: pnpm/action-setup@v3
              with:
                  version: 11

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Typecheck
              run: pnpm typecheck

            - name: Lint
              run: pnpm lint

            - name: Build codec (required by CLI spec)
              run: pnpm --filter @dgtlntv/protostar-codec build

            - name: Run Vitest unit tests
              run: pnpm test:unit

            - name: Install Playwright browsers
              run: pnpm --filter @dgtlntv/playground exec playwright install --with-deps chromium

            - name: Run Playwright e2e tests
              run: pnpm test:e2e

            - name: Upload Playwright report
              if: failure()
              uses: actions/upload-artifact@v4
              with:
                  name: playwright-report
                  path: packages/playground/playwright-report/
                  retention-days: 14
