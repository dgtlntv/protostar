<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Terminal Test</title>
        <link rel="stylesheet" href="../src/styles.css" />
        <link
            rel="stylesheet"
            href="../node_modules/@xterm/xterm/css/xterm.css"
        />
        <style>
            #terminal {
                width: 800px;
                height: 600px;
            }
            body {
                padding: 20px;
            }
        </style>
    </head>
    <body>
        <div id="terminal"></div>

        <script type="module">
            import { Terminal } from "../src/Terminal.js"

            const commands = {
                commands: {
                    hello: {
                        description: "Say hello",
                        handler: [
                            {
                                component: "text",
                                output: "Hello World!"
                            }
                        ]
                    },
                    echo: {
                        description: "Echo text back",
                        arguments: [{ name: "text", type: "string" }],
                        handler: [
                            {
                                component: "text",
                                output: "{{text}}"
                            }
                        ]
                    },
                    test1: {
                        description: "First test command",
                        handler: [
                            {
                                component: "text",
                                output: "First test command executed!"
                            }
                        ]
                    },
                    test2: {
                        description: "Second test command",
                        handler: [
                            {
                                component: "text",
                                output: "Second test command executed!"
                            }
                        ]
                    },
                    test3: {
                        description: "Third test command",
                        handler: [
                            {
                                component: "text",
                                output: "Third test command executed!"
                            }
                        ]
                    }
                }
            }

            window.terminal = new Terminal(
                document.getElementById("terminal"),
                commands
            )
        </script>
    </body>
</html>
